[mypy]
# General settings
python_version = 3.12
show_error_codes = True
exclude = ^.*temp/|^projects/

# Strictness settings
strict = True
check_untyped_defs = True
disallow_untyped_defs = True
warn_return_any = True

# Warning settings
warn_unused_ignores = True
warn_unused_configs = True

# Import settings
ignore_missing_imports = True
follow_imports = silent

# Tests have looser typing conventions: existing test files are largely untyped, and pytest fixtures / mocker
# patterns regularly use `Any`. Production code is strict; tests remain checked but not forced to annotate.
[mypy-tests.*]
disallow_untyped_defs = False
warn_unused_ignores = False