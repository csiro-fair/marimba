default_language_version:
  python: python3.12

repos:
  - repo: local

    hooks:
      - id: ruff
        name: Ruff
        entry: uv run ruff check
        language: system
        types: [ python ]
        args: [ "--fix", "--config=config/ruff.toml" ]
        exclude: ^docs/

      - id: black
        name: Black
        entry: uv run black
        language: system
        types: [ python ]
        args: [ "--line-length", "120" ]

      - id: deptry
        name: Deptry
        entry: uv run deptry
        language: system
        files: 'pyproject.toml'
        pass_filenames: false
        args : ['.']

      - id: vulture
        name: Vulture
        entry: uv run vulture
        language: system
        types: [ python ]
        args: [ '--min-confidence', '80', 'marimba/', 'config/vulture.py' ]
        exclude: ^tests/|^docs/
        pass_filenames: false

      - id: mypy
        name: Mypy
        entry: uv run mypy
        language: system
        types: [ python ]
        args: [ '--config-file', 'config/mypy.ini' ]

      - id: bandit
        name: Bandit
        entry: uv run bandit
        language: system
        types: [ python ]
        args: [ '--config', 'config/bandit.yml', '--severity-level', 'medium' ]

      - id: pytest
        name: Pytest
        entry: uv run pytest
        language: system
        types: [ python ]
        pass_filenames: false
        # `-m "not slow"` excludes the e2e regression suite (which needs network
        # to clone the demo data + pipeline and takes ~30s). The slow suite
        # runs in the pre-push hook below.
        args: [ '--rootdir', '.', '-c', 'config/pytest.ini', '-m', 'not slow' ]

      - id: pytest-e2e-regression
        name: Pytest E2E regression (mritc-demo, ~30s warm / ~60s cold cache)
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [ pre-push ]
        # Always-on pre-push gate per docs/prompts/README.md.
        # Skip with `git push --no-verify` only for genuinely doc-only pushes.
        # First-time setup: `uv run pre-commit install --hook-type pre-push`.
        args: [
          '--rootdir', '.',
          '-c', 'config/pytest.ini',
          '--no-cov',
          '-m', 'e2e and slow',
          'tests/e2e/regression/',
        ]