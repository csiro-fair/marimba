name: E2E Regression

# Independent regression gate for the mritc-demo end-to-end harness. Runs
# tests/e2e/regression/ which clones the published demo data + pipeline,
# drives the full marimba `new project` -> `import` -> `process` -> `package`
# cycle, and compares the packaged output against tests/e2e/regression/golden/
# (structural inventory + scrubbed manifest byte-equality).
#
# Excluded from the main ci.yml test job (which runs `-m "not slow and not
# e2e and not network"`). Kept as a separate workflow so failures here are
# clearly identifiable as regression-suite failures rather than unit / lint
# breakage, and so the heavier wall-clock doesn't slow the fast-feedback CI.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-regression:
    name: E2E regression (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libimage-exiftool-perl ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      # Cache the cloned demo data + pipeline so subsequent runs skip the
      # ~20s data clone. Keyed on the pinned SHAs declared in the conftest;
      # bumping either invalidates the cache automatically.
      - name: Cache e2e fixture repos
        uses: actions/cache@v4
        with:
          path: .cache/marimba-e2e
          key: e2e-cache-${{ hashFiles('tests/e2e/regression/conftest.py') }}

      - name: Run e2e regression suite
        run: uv run pytest --rootdir . -c config/pytest.ini --no-cov -m "e2e and slow" tests/e2e/regression/ -v
